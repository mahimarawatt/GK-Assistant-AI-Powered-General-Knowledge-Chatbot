<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GKnowledge Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      height: 100vh;
      color: #1a1a2e;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      background: #1a1a2e;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
    }

    #sidebar h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    #sidebar p { font-size: 12px; color: #94a3b8; margin-bottom: 40px; }

    #new-chat-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      width: 100%;
    }
    #new-chat-btn:hover { background: #4338ca; }

    #sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
                  color: #64748b; margin-bottom: 8px; }

    #conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 4px;
      color: #94a3b8;
    }
    .conv-item:hover { background: #2d3748; }
    .conv-item.active { background: #2d3748; color: white; }
    .conv-item .conv-meta { font-size: 11px; color: #64748b; margin-top: 2px; }

    #tickets-section { margin-top: 20px; }
    .ticket-item {
      padding: 8px 12px;
      background: #2d3748;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .ticket-id { color: #f59e0b; font-weight: 600; }
    .ticket-status { color: #64748b; }

    /* Main chat area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }

    #chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px; height: 36px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 600; font-size: 14px;
    }

    #chat-header h3 { font-size: 15px; font-weight: 600; }
    #chat-header p { font-size: 12px; color: #64748b; }
    #status-dot {
      width: 8px; height: 8px; background: #10b981;
      border-radius: 50%; margin-left: auto;
    }

    /* Welcome screen */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      text-align: center;
      padding: 40px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message { display: flex; gap: 12px; max-width: 80%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .message.bot .msg-avatar { background: #ede9fe; color: #4f46e5; }
    .message.user .msg-avatar { background: #dbeafe; color: #1d4ed8; }

    .msg-content {
      background: #f8fafc;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .msg-content { background: #4f46e5; color: white; border-radius: 12px 4px 12px 12px; }
    .message.bot .msg-content { border-radius: 4px 12px 12px 12px; }

    .msg-meta {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      display: flex;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.billing { background: #fef3c7; color: #92400e; }
    .badge.technical_support { background: #dbeafe; color: #1e40af; }
    .badge.complaint { background: #fee2e2; color: #991b1b; }
    .badge.general_query { background: #f0fdf4; color: #166534; }
    .badge.account_management { background: #faf5ff; color: #6b21a8; }
    .badge.escalation { background: #fff7ed; color: #c2410c; }

    .sentiment-negative { color: #ef4444; }
    .sentiment-positive { color: #10b981; }
    .sentiment-neutral { color: #6b7280; }
    .sentiment-frustrated { color: #f97316; }

    /* Ticket alert */
    .ticket-alert {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #92400e;
      margin-top: 8px;
    }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
    .typing span {
      width: 8px; height: 8px; background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Input area */
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #input-area textarea {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
    }
    #input-area textarea:focus { border-color: #4f46e5; }

    #send-btn {
      background: #4f46e5;
      color: white;
      border: none;
      width: 44px; height: 44px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { background: #c7d2fe; cursor: not-allowed; }

    #welcome h2 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; justify-content: center; }
    .quick-btn {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      color: #475569;
    }
    .quick-btn:hover { background: #ede9fe; border-color: #c4b5fd; color: #4f46e5; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>GK Assistant</h2>
  <p>Your knowledge companion</p>
  <button id="new-chat-btn" onclick="startNewChat()">+ New conversation</button>
  <h3>Recent Chats</h3>
  <div id="conv-list"></div>
  <div id="tickets-section">
    <h3 style="margin-top:16px">My Tickets</h3>
    <div id="ticket-list"></div>
  </div>
</div>

<!-- Main area -->
<div id="main">
  <div id="chat-header">
    <div class="avatar">AI</div>
    <div>
      <h3>knowledge Assistant</h3>
      <p>Powered by RAG + Llama 3.3</p>
    </div>
    <div id="status-dot"></div>
  </div>

  <div id="welcome">
    <h2>How can we help you today?</h2>
    <p>Ask me anything about billing, technical issues, or your account.</p>
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('What is photosynthesis?')">Photosynthesis</button>
      <button class="quick-btn" onclick="sendQuick('Who was Napoleon Bonaparte?')">Napoleon</button>
      <button class="quick-btn" onclick="sendQuick('What is the Pythagorean theorem?')">Pythagorean theorem</button>
      <button class="quick-btn" onclick="sendQuick('How do black holes form?')">Black holes</button>
      <button class="quick-btn" onclick="sendQuick('What caused World War 1?')">WW1 causes</button>
    </div>
  </div>

  <div id="messages" style="display:none;"></div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Type your message..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#10148;</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  const USER_ID = 'user_' + Math.random().toString(36).slice(2, 9);  // Random user ID
  let currentConvId = null;

  async function startNewChat() {
    const res = await fetch(`${API}/conversation`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: USER_ID})
    });
    const data = await res.json();
    currentConvId = data.conversation_id;
    showMessages();
    document.getElementById('messages').innerHTML = '';
    loadSidebar();
    addBotMessage("Hi! I'm your support assistant. How can I help you today?", null, null);
  }

  function showMessages() {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
  }

  function sendQuick(text) {
    document.getElementById('msg-input').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    // Start a new conversation if none active
    if (!currentConvId) await startNewChat();

    input.value = '';
    input.style.height = 'auto';

    // Show messages area, hide welcome
    showMessages();

    // Show user message
    addUserMessage(text);

    // Show typing indicator
    const typingId = showTyping();
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          user_id: USER_ID,
          conversation_id: currentConvId,
          message: text
        })
      });

      const data = await res.json();
      removeTyping(typingId);

      addBotMessage(data.answer, data.intent, data.sentiment, data.ticket_id);

      if (data.ticket_id) loadTickets();
    } catch (err) {
      removeTyping(typingId);
      addBotMessage("Sorry, I'm having trouble connecting. Please try again.", null, null);
    }

    document.getElementById('send-btn').disabled = false;
    scrollToBottom();
  }

  function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `
      <div class="msg-avatar">You</div>
      <div>
        <div class="msg-content">${escapeHtml(text)}</div>
      </div>`;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
  }

  function addBotMessage(text, intent, sentiment, ticketId) {
    const div = document.createElement('div');
    div.className = 'message bot';

    let meta = '';
    if (intent) meta += `<span class="badge ${intent}">${intent.replace('_',' ')}</span>`;
    if (sentiment) meta += `<span class="sentiment-${sentiment}">${sentiment}</span>`;

    let ticketAlert = '';
    if (ticketId) {
      ticketAlert = `<div class="ticket-alert">Ticket created: <strong>${ticketId}</strong> — A human agent will contact you shortly.</div>`;
    }

    div.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div>
        <div class="msg-content">${escapeHtml(text)}</div>
        ${meta ? `<div class="msg-meta">${meta}</div>` : ''}
        ${ticketAlert}
      </div>`;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'message bot'; div.id = id;
    div.innerHTML = `<div class="msg-avatar">AI</div>
      <div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) { document.getElementById(id)?.remove(); }

  async function loadSidebar() {
    const res = await fetch(`${API}/conversations/${USER_ID}`);
    const convs = await res.json();
    const list = document.getElementById('conv-list');
    list.innerHTML = convs.slice(0, 10).map(c => `
      <div class="conv-item ${c.id === currentConvId ? 'active' : ''}"
           onclick="loadConversation('${c.id}')">
        Chat session
        <div class="conv-meta">${c.message_count} messages</div>
      </div>`).join('');
  }

  async function loadTickets() {
    const res = await fetch(`${API}/tickets/${USER_ID}`);
    const tickets = await res.json();
    document.getElementById('ticket-list').innerHTML = tickets.map(t => `
      <div class="ticket-item">
        <span class="ticket-id">${t.id}</span>
        <div class="ticket-status">${t.status} · ${t.priority} priority</div>
      </div>`).join('') || '<div style="font-size:12px;color:#64748b">No tickets</div>';
  }

  async function loadConversation(convId) {
    currentConvId = convId;
    const res = await fetch(`${API}/history/${convId}`);
    const history = await res.json();
    showMessages();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    history.forEach(m => {
      if (m.role === 'user') addUserMessage(m.content);
      else addBotMessage(m.content, null, null);
    });
    loadSidebar();
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/\n/g,'<br>');
  }

  // Load initial data
  loadTickets();
</script>
</body>
</html>
